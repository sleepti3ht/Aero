name: Build and Release Aero

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller customtkinter pystray pillow

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --name Aero --icon=icon.ico --add-data "icon.ico;." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aero-windows
          path: dist/Aero.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Aero.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
